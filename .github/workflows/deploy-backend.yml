# Deploy HANYA folder backend/ ke Azure App Service (frontend di Vercel, bukan di Azure)
# WORKING_DIRECTORY = ./backend  → setara "root directory backend" di Azure
#
# SETUP (sekali, via browser):
# 1. Azure Portal → Web App → Download publish profile
# 2. GitHub repo → Settings → Secrets → Actions:
#    - AZURE_WEBAPP_NAME        = nama web app (contoh: krs-api-xxx)
#    - AZURE_WEBAPP_PUBLISH_PROFILE = isi file publish profile (XML)
# 3. Azure → Configuration → Application settings:
#    DATABASE_URL, REDIS_URL, JWT_SECRET, CORS_ORIGIN, MODE=production
#
# Jalankan: push ke branch main
#
# --- ALTERNATIF: Azure Container Apps ---
# Uncomment job deploy-container-apps di bawah dan set secrets:
#   ACR_LOGIN_SERVER, ACR_USERNAME, ACR_PASSWORD
#   AZURE_CREDENTIALS (service principal JSON)
#   AZURE_CONTAINER_APP_NAME, AZURE_RESOURCE_GROUP
# Lihat DEPLOY.md §7

name: Deploy Backend (Azure App Service)

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

env:
  GO_VERSION: '1.25'
  WORKING_DIRECTORY: ./backend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIRECTORY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: backend/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Build binary
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o ../api-binary ./cmd/main.go

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: api-binary

