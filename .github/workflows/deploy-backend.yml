# Deploy HANYA folder backend/ ke Azure App Service (frontend di Vercel, bukan di Azure)
# WORKING_DIRECTORY = ./backend  → setara "root directory backend" di Azure
#
# SETUP (sekali, via browser):
# 1. Azure Portal → Web App → Download publish profile
# 2. GitHub repo → Settings → Secrets → Actions:
#    - AZURE_WEBAPP_NAME        = nama web app (contoh: krs-api-xxx)
#    - AZURE_WEBAPP_PUBLISH_PROFILE = isi file publish profile (XML)
# 3. Azure → Configuration → Application settings:
#    DATABASE_URL, REDIS_URL, JWT_SECRET, CORS_ORIGIN, MODE=production
#
# Jalankan: push ke branch main
#
name: Deploy Backend (Azure App Service)

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  WORKING_DIRECTORY: ./backend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIRECTORY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: |
          npm run build
          mkdir -p build
          cp -r dist build/
          cp -r migrations build/
          cp package.json package-lock.json build/
          cd build && npm ci --omit=dev

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: backend/build


